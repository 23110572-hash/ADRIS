services:
  - type: web
    name: adris-api
    runtime: python
    rootDir: adris/backend
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health/ready
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_MIGRATION_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_QUARANTINE_BUCKET
        sync: false
      - key: S3_EVIDENCE_BUCKET
        sync: false
      - key: S3_DERIVATIVES_BUCKET
        sync: false
      - key: S3_EXPORTS_BUCKET
        sync: false
      - key: AWS_KMS_KEY_ID
        sync: false
      - key: JWT_ISSUER
        sync: false
      - key: JWT_AUDIENCE
        sync: false
      - key: JWKS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
  - type: worker
    name: adris-worker
    runtime: python
    rootDir: adris/backend
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: celery -A worker.celery_app:celery_app worker -B --loglevel=INFO --queues=file-validation,ocr,transcription,agent-analysis,graph-analysis,evidence-export
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_QUARANTINE_BUCKET
        sync: false
      - key: S3_EVIDENCE_BUCKET
        sync: false
      - key: S3_DERIVATIVES_BUCKET
        sync: false
      - key: S3_EXPORTS_BUCKET
        sync: false
      - key: AWS_KMS_KEY_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
